<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DYOR HQ — AI-powered investment research. Deep-dive reports with conviction scores, risk analysis, and actionable recommendations.">
  <title>DYOR HQ — AI-Powered Investment Research</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body>

  <!-- ─── Header ─────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-wordmark">DYOR <span>HQ</span></span>
        <span class="logo-badge">AI Research</span>
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Reports</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ─── Main ───────────────────────────────────── -->
  <main>
    <div class="container">

      <!-- Hero -->
      <div class="page-hero">
        <h1>Investment Research</h1>
        <p class="tagline">AI-powered investment research. Do your own research, better.</p>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" id="search" placeholder="Search by company, ticker, or keyword…">
        </div>
        <div class="filter-group" role="group" aria-label="Filter by recommendation">
          <button class="filter-btn active" data-rec="ALL">All</button>
          <button class="filter-btn" data-rec="BUY">Buy</button>
          <button class="filter-btn" data-rec="HOLD">Hold</button>
          <button class="filter-btn" data-rec="REDUCE">Reduce</button>
          <button class="filter-btn" data-rec="SELL">Sell</button>
        </div>
        <span id="report-count" style="font-size:13px;color:var(--text-muted);white-space:nowrap;"></span>
      </div>

      <!-- Reports Grid -->
      <div id="reports-grid" class="reports-grid">
        <div class="empty-state"><p>Loading reports…</p></div>
      </div>

    </div>
  </main>

  <!-- ─── Footer ─────────────────────────────────── -->
  <footer>
    <div class="footer-inner">
      <p class="footer-disclaimer">
        Research is for informational purposes only. Not financial advice.
        All analysis reflects the date of publication. Always conduct your own due diligence.
      </p>
      <div class="footer-brand">DYOR <span>HQ</span></div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
