name: Auto-Report Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  auto-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dyor-v4-work
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect new tickers
        run: node scripts/detect-new-tickers.js

      - name: Check new-tickers.json
        id: check_new
        run: |
          if [ -s state/new-tickers.json ]; then
            echo "new_tickers=$(cat state/new-tickers.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d["unmatched"])))')" >> $GITHUB_OUTPUT
            echo "tickers=$(python3 -c 'import json; d=json.load(open("state/new-tickers.json")); print(",".join([t["ticker"] for t in d["unmatched"]]))')" >> $GITHUB_OUTPUT
          else
            echo "new_tickers=0" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Generate reports
        if: steps.check_new.outputs.new_tickers != '0'
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
        run: |
          TICKERS="${{ steps.check_new.outputs.tickers }}"
          for TICKER in $(echo "$TICKERS" | tr ',' ' '); do
            echo "Generating report for $TICKER..."
            node scripts/generate-report.js "$TICKER"
          done

      - name: Run pre-commit checks
        if: steps.check_new.outputs.new_tickers != '0'
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: node scripts/pre-commit-check.js

      - name: Build site
        run: npm run build

      - name: Commit new reports
        run: |
          git config --local user.email "github-actions@dyorhq.ai"
          git config --local user.name "DYOR HQ Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: auto-generated reports"
            git push origin dyor-v4-work
          fi

      - name: Health check
        if: steps.check_new.outputs.new_tickers != '0'
        run: node scripts/health-check.js