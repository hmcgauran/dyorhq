[build]
  command = "cp reports/*.html public/reports/ && cp reports-index.json public/ && cp index.html public/"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

[[headers]]
  for = "/reports-index.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/reports/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
