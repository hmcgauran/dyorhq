[build]
  command = "mkdir -p public/reports public/assets/css public/assets/js && cp -r reports/*.html public/reports/ 2>/dev/null; cp -r assets/css/* public/assets/css/ 2>/dev/null; cp -r assets/js/* public/assets/js/ 2>/dev/null; cp reports-index.json public/ 2>/dev/null; cp index.html public/ 2>/dev/null; echo 'Build OK'"
  publish = "public"
  functions = "netlify/functions"
